name: Deploy to GitHub Pages

on:
  push:
    branches: [tata-house]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Diagnóstico de secrets (só tamanho, nunca o valor)
        env:
          A: ${{ secrets.ANTHROPIC_API_KEY }}
          O: ${{ secrets.OPENAI_API_KEY }}
          S: ${{ secrets.EMAILJS_SERVICE_ID }}
          T: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          P: ${{ secrets.EMAILJS_PUBLIC_KEY }}
        run: |
          echo "ANTHROPIC_API_KEY  -> tamanho ${#A}"
          echo "OPENAI_API_KEY     -> tamanho ${#O}"
          echo "EMAILJS_SERVICE_ID -> tamanho ${#S}"
          echo "EMAILJS_TEMPLATE_ID-> tamanho ${#T}"
          echo "EMAILJS_PUBLIC_KEY -> tamanho ${#P}"

      - run: npm run build
        env:
          NEXT_PUBLIC_EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          NEXT_PUBLIC_EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          NEXT_PUBLIC_EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
          NEXT_PUBLIC_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Adicionar .nojekyll
        run: touch out/.nojekyll

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
